name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # Create GitHub Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
    - uses: actions/checkout@v4

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: Tauq ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true

  # Build and upload release binaries
  build-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        mkdir -p dist
        cp target/${{ matrix.target }}/release/tauq dist/
        cp target/${{ matrix.target }}/release/tauq-lsp dist/
        cp README.md LICENSE dist/ 2>/dev/null || true
        cd dist && tar -czvf ../tauq-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        mkdir dist
        copy target\${{ matrix.target }}\release\tauq.exe dist\
        copy target\${{ matrix.target }}\release\tauq-lsp.exe dist\
        copy README.md dist\ 2>nul || echo.
        cd dist && 7z a -tzip ..\tauq-${{ github.ref_name }}-${{ matrix.target }}.zip *

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          tauq-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}

  # Publish to crates.io
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build-release
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Publish to crates.io
      run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}

  # Build and publish WASM to npm
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-release
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Install wasm-pack
      run: cargo install wasm-pack

    - name: Build WASM
      working-directory: bindings/js
      run: wasm-pack build --target nodejs

    - name: Publish to npm
      working-directory: bindings/js/pkg
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Build and publish Python wheels to PyPI
  publish-pypi:
    name: Publish to PyPI
    runs-on: ${{ matrix.os }}
    needs: build-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: universal2-apple-darwin
          - os: windows-latest
            target: x64
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Build wheels
      uses: PyO3/maturin-action@v1
      with:
        target: ${{ matrix.target }}
        args: --release --out dist
        manylinux: auto

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}-${{ matrix.target }}
        path: dist/*.whl

  publish-pypi-upload:
    name: Upload to PyPI
    runs-on: ubuntu-latest
    needs: publish-pypi
    environment:
      name: pypi
      url: https://pypi.org/project/tauq/
    permissions:
      id-token: write
    steps:
    - name: Download wheels
      uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        merge-multiple: true
        path: dist/

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
